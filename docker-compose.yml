version: '3.9'

services:
  postgres:
    image: postgres:15
    container_name: pos_postgres
    restart: always
    environment:
      POSTGRES_USER: pos_user
      POSTGRES_PASSWORD: pos_password
      POSTGRES_DB: pos_db
    ports:
      - "5438:5432"
    volumes:
      - pos_postgres_data:/var/lib/postgresql/data

volumes:
  pos_postgres_data: